<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>museum-kiosk</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- 🔥 FIX SFONDO + NO BANDE NERE -->
    <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;

    /* 🔥 immagine di sfondo */
    background: url("/background.png") center center / cover no-repeat;

    font-family: 'Barlow Condensed', sans-serif;

    position: relative;
  }

  /* 🔥 overlay scuro sopra l’immagine */
  body::before {
    content: "";
    position: fixed;
    inset: 0;

    background: rgba(0, 0, 0, 0.55); /* 👈 regola qui la scurezza */

    pointer-events: none;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
  }
</style>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
